name: Build Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # deb/rpm: built on old Ubuntu for maximum distro compatibility
  build-deb-rpm:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_BASE_URL: https://server.bymrefitted.com
        run: npm run tauri build -- --bundles deb,rpm

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: bymr-launcher-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload rpm
        uses: actions/upload-artifact@v4
        with:
          name: bymr-launcher-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm

  # AppImage: built on Arch Linux — Ubuntu is missing gbm drivers needed for EGL on Nvidia/Wayland.
  # Uses tauri-cli from feat/truly-portable-appimage (targets 2.10.2, not yet in stable release).
  # Track https://github.com/tauri-apps/tauri/pull/12491 — once merged, revert to npm run tauri build.
  build-appimage:
    runs-on: ubuntu-latest
    container: ghcr.io/pkgforge-dev/archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Arch container (installs xvfb, quick-sharun, base-devel)
        uses: pkgforge-dev/anylinux-setup-action@v1

      - name: Install Tauri dependencies
        run: |
          pacman -S --noconfirm \
            webkit2gtk-4.1 \
            curl \
            file \
            xdotool \
            openssl \
            libappindicator-gtk3 \
            librsvg \
            nodejs \
            npm \
            rustup \
            patchelf
          rustup toolchain install stable
          rustup default stable

      - name: Install tauri-cli from portable AppImage branch
        run: cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/truly-portable-appimage --locked

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build AppImage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_BASE_URL: https://server.bymrefitted.com
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: "true"
        run: cargo tauri build --bundles appimage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: bymr-launcher-appimage
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
